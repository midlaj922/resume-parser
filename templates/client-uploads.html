    <style>
      .form-container {
        background: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        transition: transform 0.3s ease;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
      }
      
      .form-container:hover {
        transform: translateY(-5px);
      }

      .input-group {
        flex: 1;
        min-width: 0;
      }

      .input-group input {
        transition: all 0.3s ease;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 0.75rem;
        width: 100%;
      }

      .input-group input:focus {
        border-color: #000;
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
        outline: none;
      }

      .upload-box {
        transition: all 0.3s ease;
        border-radius: 0.5rem;
        margin-top: 1rem;
      }

      .upload-box:hover {
        transform: scale(1.02);
        border-color: #000;
      }

      .submit-btn {
        background: black;
        color: white;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        font-weight: 600;
        transition: all 0.3s ease;
        width: 100%;
        cursor: pointer;
      }

      .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .welcome-section {
        text-align: center;
        margin-bottom: 2rem;
        padding: 0 1rem;
      }

      .welcome-section h3 {
        font-size: 1.5rem;
        color: #4B5563;
        margin-bottom: 0.5rem;
      }

      .stats-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
        padding: 0 1rem;
      }

      .stat-card {
        background: #F9FAFB;
        padding: 1.5rem;
        border-radius: 0.5rem;
        text-align: center;
        transition: all 0.3s ease;
      }

      .stat-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      }

      .stat-card i {
        font-size: 1.5rem;
        color: #000;
        margin-bottom: 0.5rem;
      }

      .stat-card h4 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.25rem;
      }

      .stat-card p {
        color: #6B7280;
        font-size: 0.875rem;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .animate-fade-in {
        animation: fadeIn 0.5s ease-out forwards;
      }

      /* New responsive styles */
      @media (max-width: 768px) {
        .name-section, .contact-section {
          flex-direction: column;
          gap: 1rem;
        }

        .stats-container {
          grid-template-columns: 1fr;
        }

        .form-container {
          padding: 1rem;
          margin: 1rem;
        }
      }

      /* Form section styles */
      .form-section {
        padding: 0 1rem;
      }

      .form-section h1 {
        margin-bottom: 1.5rem;
        padding: 0 1rem;
      }

      .input-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: #374151;
      }

      .required {
        color: #EF4444;
      }
    </style>
  </head>

            <div class="form-section">
              <h1 class="title text-2xl font-bold mb-6">Recruitment Submission</h1>
              <form action="/client-uploads" method="POST" enctype="multipart/form-data">
      
<!-- Name Section -->
<div class="name-section flex gap-4">
  <div class="input-group">
      <label for="first-name">First Name <span class="required">*</span></label>
      <input type="text" id="first-name" name="first_name" placeholder="First Name"
             value="{{ user_first_name }}" required>
  </div>
  <div class="input-group">
      <label for="last-name">Last Name <span class="required">*</span></label>
      <input type="text" id="last-name" name="last_name" placeholder="Last Name"
             value="{{ user_last_name }}" required>
  </div>
</div>

<!-- Contact Section -->
<div class="contact-section flex gap-4 mt-4">
  <div class="input-group">
      <label for="email">E-mail <span class="required">*</span></label>
      <input type="email" id="email" name="email" placeholder="ex: myname@example.com"
             value="{{ user_email }}" required>
  </div>
  <div class="input-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="(000) 000-0000"
             value="{{ user_phone }}">
  </div>
</div>
    
                 <!-- Resume Upload -->
<div class="upload-section mt-4">
  <label for="resume">Upload your Resume</label>
  
  <label for="resume" class="upload-box border border-dashed p-4 text-center cursor-pointer bg-gray-50 hover:bg-gray-100 block">
      <span class="upload-icon text-3xl">☁</span>
      <p id="upload-text">Click or drag and drop file here</p>
      <p class="text-sm text-gray-500">Only PDF, DOC, DOCX allowed</p>
  </label>

  <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required class="hidden" onchange="updateFileName()">
</div>

<script>
function updateFileName() {
  const input = document.getElementById('resume');
  const uploadText = document.getElementById('upload-text');
  if (input.files.length > 0) {
      uploadText.textContent = "Selected file: " + input.files[0].name;
  } else {
      uploadText.textContent = "Click or drag and drop file here";
  }
}
</script>


      
                  <!-- Submit Button -->
                  <div class="mt-6">
                      <button type="submit" class="submit-btn ">Submit Form</button>
                  </div>
              </form>
          </div>
      </div>
          </div>
  </body>
  <script>
    // Add form validation and interactive feedback
    document.addEventListener('DOMContentLoaded', function() {
      const form = document.querySelector('form');
      const inputs = form.querySelectorAll('input');
      
      inputs.forEach(input => {
        input.addEventListener('input', function() {
          if (this.value) {
            this.classList.add('border-green-500');
          } else {
            this.classList.remove('border-green-500');
          }
        });
      });

      // Add drag and drop functionality
      const uploadBox = document.querySelector('.upload-box');
      
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        uploadBox.addEventListener(eventName, preventDefaults, false);
      });

      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      ['dragenter', 'dragover'].forEach(eventName => {
        uploadBox.addEventListener(eventName, highlight, false);
      });

      ['dragleave', 'drop'].forEach(eventName => {
        uploadBox.addEventListener(eventName, unhighlight, false);
      });

      function highlight(e) {
        uploadBox.classList.add('bg-gray-100');
      }

      function unhighlight(e) {
        uploadBox.classList.remove('bg-gray-100');
      }

      uploadBox.addEventListener('drop', handleDrop, false);

      function handleDrop(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        const fileInput = document.getElementById('resume');
        fileInput.files = files;
        updateFileName();
      }
    });
  </script>
